apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend-store
  template:
    metadata:
      labels:
        app: trend-store
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: trend-store
          image: sriramsuryaa/trend-store-prod:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: trend-store-nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.12.0
          args:
            - "--nginx.scrape-uri=http://127.0.0.1:80/stub_status"
            - "--web.listen-address=:9113"
          ports:
            - containerPort: 9113
              name: metrics
      volumes:
        - name: trend-store-nginx-config
          configMap:
            name: trend-store-nginx-config