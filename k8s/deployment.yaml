apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-store
spec:
  replicas: 2

  selector:
    matchLabels:
      app: trend-store 

  template:
    metadata:
      labels:
        app: trend-store   

    spec:
      imagePullSecrets:
        - name: regcred

      containers:
        - name: trend-store
          image: ${TSAPP_DREPO}:latest
          ports:
            - containerPort: 80