version: '3.8'

services:

  trendstore-monitor:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: trendstore-monitor
    networks:
      - monitoring
    restart: unless-stopped
    ports:
      - "9113:9113"
    command: --nginx.scrape-uri=http://adc7f9b2f6045475da8cecb5b8122f74-1532980413.ap-south-1.elb.amazonaws.com/stub_status

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - trendstore-monitor


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge